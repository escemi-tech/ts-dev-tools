name: Shared - Continuous Integration for common tasks

on:
  workflow_call:
    outputs:
      build-artifact-id:
        description: "The ID of the build artifact"
        value: ${{ jobs.continuous-integration.outputs.build-artifact-id }}

permissions: {}

jobs:
  continuous-integration:
    uses: hoverkraft-tech/ci-github-nodejs/.github/workflows/continuous-integration.yml@6b74a8f070140f5c120f78026d58e4c00d1b1e37 # 0.24.2
    permissions:
      contents: read
      id-token: write
      packages: read
      pull-requests: write
      security-events: write
    with:
      build: '{"artifact":"packages/*/dist"}'
      test: |
        {"coverage": "codecov"}
