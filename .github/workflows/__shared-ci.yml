name: Shared - Continuous Integration for common tasks

on:
  workflow_call:
    outputs:
      build-artifact-id:
        description: "The ID of the build artifact"
        value: ${{ jobs.continuous-integration.outputs.build-artifact-id }}

permissions: {}

jobs:
  continuous-integration:
    uses: hoverkraft-tech/ci-github-nodejs/.github/workflows/continuous-integration.yml@9f77c58db848451f244f78047fbf779c60bb8641 # 0.23.1
    permissions:
      contents: read
      id-token: write
      packages: read
      pull-requests: write
      security-events: write
    with:
      build: '{"artifact":"packages/*/dist"}'
      test: |
        {"coverage": "codecov"}
